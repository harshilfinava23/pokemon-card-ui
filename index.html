<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
</head>

<body>

    <div class="card">

        <div class="left">


            <img class="logo" src="logo.png" alt="logo">


            <div class="title">POKEMON GEN I</div>

            <h1>Pikachu</h1>

            <p>Pikachu is an Electric-type Pokémon introduced in Generation I.
                Pikachu are small, chubby, and incredibly
                cute mouse-like Pokémon. They are almost completely covered by yellow fur.</p>

            <div class="count">
                <div class="line"></div>
                01/08

            </div>

            <img class="pokemonball" src="pokemon_ball.png" alt="image">

        </div>

        <div class="right">

            <img class="pikachu" src="pokemon_model.png" alt="pokemon">

            <div class="menu">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="dot">
                <div id="active"></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
        </div>

    </div>
</body>

</html>
